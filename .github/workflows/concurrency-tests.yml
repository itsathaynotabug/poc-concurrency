name: Concurrency Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  concurrency-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instala Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Instala dependências
      - name: Instalar dependências
        run: npm install

      # 4. Instala k6
      - name: Instalar k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.55.0/k6-v0.55.0-linux-amd64.tar.gz -L | tar xvz
          sudo mv k6-v0.55.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      # 5. Instala wait-on para esperar servidor
      - name: Instalar wait-on
        run: npm install -g wait-on

      # 6. Setup inicial do db.json
      - name: Setup db.json
        run: node setup-db.js

      # 7. Sobe o json-server customizado em background
      - name: Subir json-server customizado
        run: nohup node server.js > /tmp/json-server.log 2>&1 &

      # 8. Aguarda o servidor estar realmente pronto
      - name: Aguardar servidor estar pronto
        run: |
          echo "Aguardando json-server na porta 3000..."
          wait-on http://localhost:3000/pokemons --timeout 30000 --interval 1000
          echo "✅ Servidor pronto!"

      # 9. Roda os testes (cada um reseta o db via POST /reset)
      - name: Lost Update Test
        run: node run-lost-update-test.js

      - name: Double Action Test
        run: node run-double-action-test.js

      - name: Dirty Read Test
        run: node run-dirty-read-test.js
        
      - name: Exibir logs do json-server se houver erro
        if: failure()
        run: echo "JSON-Server logs:" && tail -50 /tmp/json-server.log || echo "Nenhum log disponível"
